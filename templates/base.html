<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col antialiased">

    <nav class="w-full fixed top-0 z-50 px-6 py-4 flex justify-between items-center backdrop-blur-md bg-gray-950/40 border-b border-white/5">
        <a href="/" class="text-2xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-500 flex items-center gap-2">
            <i class="fa-solid fa-microphone-lines text-indigo-500"></i> EdTech AI
        </a>
        
       <div class="flex items-center gap-6">
            <a href="{{ url_for('help_page') }}" class="text-sm font-semibold text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                <i class="fa-regular fa-circle-question"></i> Support
            </a>
            
            <div class="h-6 w-px bg-gray-700"></div> {% if current_user.is_authenticated %}
                <a href="{{ url_for('dashboard') }}" class="text-sm font-semibold text-gray-300 hover:text-white transition-colors">Dashboard</a>
                <a href="{{ url_for('settings') }}" class="h-8 w-8 rounded-full bg-indigo-600 flex items-center justify-center text-white hover:bg-indigo-500 transition-colors shadow-lg shadow-indigo-500/20">
                    {{ current_user.username[0]|upper }}
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="text-sm font-semibold text-gray-300 hover:text-white transition-colors">Log In</a>
                <a href="{{ url_for('register') }}" class="text-sm font-bold bg-white text-black hover:bg-gray-200 py-2 px-5 rounded-full transition-all shadow-[0_0_15px_rgba(255,255,255,0.2)]">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow flex flex-col relative pt-[72px]">
        {% block content %}{% endblock %}
    </main>

    <footer class="w-full border-t border-gray-800/50 bg-gray-950 py-8 relative z-40 mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-gray-500 text-sm">
                &copy; 2026 EdTech AI. All rights reserved.
            </div>
            
            <div class="flex flex-col items-center">
                <span class="text-sm text-gray-400 mb-1">Engineered with <i class="fa-solid fa-heart text-red-500 mx-1"></i> by</span>
                <span class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Binit Shaw</span>
            </div>
            
            <div class="flex gap-5">
                <a href="https://www.linkedin.com/in/binit-shaw-4b0388329" target="_blank" class="text-gray-500 hover:text-indigo-400 transition-colors text-2xl" title="Connect on LinkedIn">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
                <a href="https://github.com/Binitshaw21" target="_blank" class="text-gray-500 hover:text-white transition-colors text-2xl" title="View GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="#" target="_blank" class="text-gray-500 hover:text-blue-400 transition-colors text-2xl" title="Portfolio">
                    <i class="fa-solid fa-globe"></i>
                </a>
            </div>
        </div>
    </footer>

    <div id="toastContainer" class="fixed top-20 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>
</body>
</html>
