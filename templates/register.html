{% extends "base.html" %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 glass-card p-10 rounded-2xl">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-white">Create your account</h2>
            <p class="mt-2 text-center text-sm text-gray-400">Join to start generating AI notes</p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('register') }}" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="username" class="text-sm font-medium text-gray-300 block mb-1">Username</label>
                    <input id="username" name="username" type="text" required class="appearance-none relative block w-full px-4 py-3 border border-gray-700 bg-gray-800/50 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all sm:text-sm" placeholder="Choose a username">
                </div>
                <div>
                    <label for="password" class="text-sm font-medium text-gray-300 block mb-1">Password</label>
                    <input id="password" name="password" type="password" required class="appearance-none relative block w-full px-4 py-3 border border-gray-700 bg-gray-800/50 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all sm:text-sm" placeholder="Create a strong password">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 transition-all shadow-lg shadow-indigo-500/30">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fa-solid fa-user-plus text-indigo-400 group-hover:text-indigo-300 transition-colors"></i>
                    </span>
                    Sign Up
                </button>
            </div>
        </form>
        <div class="text-center mt-4">
            <p class="text-sm text-gray-400">Already have an account? <a href="{{ url_for('login') }}" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
